apiVersion: apps/v1
kind: Deployment
metadata:
  name: backend
  namespace: teyavet
  labels:
    app: backend
  annotations:
    keel.sh/policy: force      # always update when :latest digest changes in ECR
    keel.sh/trigger: poll      # poll ECR rather than wait for a webhook
spec:
  replicas: 2
  selector:
    matchLabels:
      app: backend
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0        # zero-downtime: always keep 2 pods up during rollout
  template:
    metadata:
      labels:
        app: backend
    spec:
      # No imagePullSecrets needed — EKS nodes have AmazonEC2ContainerRegistryReadOnly IAM role
      containers:
        - name: backend
          # AWS_ACCOUNT_ID is substituted by deploy-eks.yml at apply time
          image: AWS_ACCOUNT_ID.dkr.ecr.us-east-1.amazonaws.com/teyavet/backend:latest
          imagePullPolicy: Always
          ports:
            - containerPort: 5000
              protocol: TCP
          securityContext:
            runAsNonRoot: true
            runAsUser: 1000
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: false
          env:
            - name: FLASK_APP
              valueFrom:
                configMapKeyRef:
                  name: backend-config
                  key: FLASK_APP
            - name: DB_HOST
              valueFrom:
                configMapKeyRef:
                  name: backend-config
                  key: DB_HOST
            - name: DB_PORT
              valueFrom:
                configMapKeyRef:
                  name: backend-config
                  key: DB_PORT
            - name: DB_USER
              valueFrom:
                configMapKeyRef:
                  name: backend-config
                  key: DB_USER
            - name: DB_NAME
              valueFrom:
                configMapKeyRef:
                  name: backend-config
                  key: DB_NAME
            - name: CORS_ORIGINS
              valueFrom:
                configMapKeyRef:
                  name: backend-config
                  key: CORS_ORIGINS
            - name: DB_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: backend-secrets
                  key: DB_PASSWORD
            - name: JWT_SECRET_KEY
              valueFrom:
                secretKeyRef:
                  name: backend-secrets
                  key: JWT_SECRET_KEY
          resources:
            requests:
              cpu: "250m"
              memory: "256Mi"
            limits:
              cpu: "500m"
              memory: "512Mi"
          livenessProbe:
            httpGet:
              path: /health
              port: 5000
            initialDelaySeconds: 20   # give Flask time to connect to RDS on startup
            periodSeconds: 15
            failureThreshold: 3
            timeoutSeconds: 5
          readinessProbe:
            httpGet:
              path: /health
              port: 5000
            initialDelaySeconds: 10
            periodSeconds: 10
            failureThreshold: 3
            timeoutSeconds: 5
