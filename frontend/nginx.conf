server {
    listen 80;

    root /usr/share/nginx/html;
    index index.html;

    # ALB health check
    location /health {
        return 200 'ok';
        add_header Content-Type text/plain;
    }

    # React SPA — all unknown paths serve index.html
    location / {
        try_files $uri $uri/ /index.html;
    }
}
