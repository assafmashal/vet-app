services:
  mysql:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: mysql8
    environment:
      MYSQL_ROOT_PASSWORD: pandaTeya
      MYSQL_DATABASE: vet
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      timeout: 20s
      retries: 10

volumes:
  mysql_data:


