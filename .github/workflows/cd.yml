# Continuous Deployment — triggered on every push to master
name: CD — Build, Push & Test

on:
  push:
    branches: [master]

jobs:
  # ── Job 1: Build all images, run full test suite ─────────────────────────────
  build-and-test:
    name: Build & Test
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build DB image from our Dockerfile
        run: docker build -t vet-db ./db

      - name: Start DB container
        run: |
          docker run -d --name vet-mysql \
            --network=host \
            -e MYSQL_ROOT_PASSWORD=pandaTeya \
            -e MYSQL_DATABASE=vet \
            vet-db

      - name: Wait for MySQL to be ready
        run: |
          for i in $(seq 1 20); do
            docker exec vet-mysql mysqladmin ping -uroot -ppandaTeya --silent && exit 0
            sleep 3
          done
          docker logs vet-mysql
          exit 1

      - name: Build backend image
        uses: docker/build-push-action@v5
        with:
          context: ./backend
          push: false
          load: true
          tags: |
            vet-backend:${{ github.sha }}
            vet-backend:latest

      - name: Start backend container
        run: |
          docker run -d --name vet-backend \
            --network=host \
            -e FLASK_APP=backend.app \
            -e DB_HOST=127.0.0.1 \
            -e DB_PORT=3306 \
            -e DB_USER=root \
            -e DB_PASSWORD=pandaTeya \
            -e DB_NAME=vet \
            -e JWT_SECRET_KEY=ci-test-secret \
            -e CORS_ORIGINS=http://localhost:5173 \
            vet-backend:${{ github.sha }}

      - name: Wait for backend to be ready
        run: |
          for i in $(seq 1 15); do
            curl -sf http://localhost:5000/health && exit 0
            sleep 2
          done
          docker logs vet-backend
          exit 1

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Install dev dependencies
        run: pip install -r backend/requirements-dev.txt

      - name: Run unit tests
        run: pytest backend/tests/unit -v

      - name: Run E2E tests
        run: pytest backend/tests/e2e -v

      - name: Build frontend image
        uses: docker/build-push-action@v5
        with:
          context: ./frontend
          file: ./frontend/Dockerfile.prod
          push: false
          load: true
          build-args: VITE_API_URL=
          tags: vet-frontend:${{ github.sha }}

      - name: Start frontend container
        run: |
          docker run -d --name vet-frontend \
            --network=host \
            vet-frontend:${{ github.sha }}

      - name: Smoke test — frontend serves HTML
        run: |
          for i in $(seq 1 10); do
            curl -sf http://localhost:80 | grep -i "html" && exit 0
            sleep 2
          done
          docker logs vet-frontend
          exit 1

      - name: Scan backend image for vulnerabilities
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: vet-backend:${{ github.sha }}
          format: table
          exit-code: "1"
          severity: CRITICAL
          ignore-unfixed: true

      - name: Scan frontend image for vulnerabilities
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: vet-frontend:${{ github.sha }}
          format: table
          exit-code: "1"
          severity: CRITICAL
          ignore-unfixed: true

      - name: Stop and remove containers
        if: always()
        run: |
          docker rm -f vet-backend || true
          docker rm -f vet-mysql || true
          docker rm -f vet-frontend || true

  # ── Job 2: Push backend + frontend images to ECR ────────────────────────────
  push-to-ecr:
    name: Push to ECR
    needs: build-and-test
    runs-on: ubuntu-latest
    permissions:
      id-token: write   # required to request a JWT from GitHub's OIDC provider
      contents: read    # required to checkout the repo

    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: us-east-1

      - name: Log in to ECR
        uses: aws-actions/amazon-ecr-login@v2

      - name: Push backend to ECR
        uses: docker/build-push-action@v5
        with:
          context: ./backend
          push: true
          tags: |
            ${{ secrets.ECR_BACKEND_URL }}:${{ github.sha }}
            ${{ secrets.ECR_BACKEND_URL }}:latest

      - name: Push frontend to ECR
        uses: docker/build-push-action@v5
        with:
          context: ./frontend
          file: ./frontend/Dockerfile.prod
          push: true
          build-args: VITE_API_URL=
          tags: |
            ${{ secrets.ECR_FRONTEND_URL }}:${{ github.sha }}
            ${{ secrets.ECR_FRONTEND_URL }}:latest
