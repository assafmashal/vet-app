apiVersion: batch/v1
kind: Job
metadata:
  name: db-migrate
  namespace: teyavet
spec:
  ttlSecondsAfterFinished: 300   # auto-delete pod 5 min after completion
  template:
    spec:
      restartPolicy: Never
      containers:
        - name: migrate
          image: mysql:8.0
          command: ["sh", "-c"]
          args:
            - |
              echo "Running schema migration..."
              mysql -h "$DB_HOST" -u "$DB_USER" -p"$DB_PASSWORD" "$DB_NAME" < /sql/schema.sql
              echo "Running seed data..."
              mysql -h "$DB_HOST" -u "$DB_USER" -p"$DB_PASSWORD" "$DB_NAME" < /sql/seed_data.sql
              echo "Migration complete."
          env:
            - name: DB_HOST
              valueFrom:
                configMapKeyRef:
                  name: backend-config
                  key: DB_HOST
            - name: DB_USER
              valueFrom:
                configMapKeyRef:
                  name: backend-config
                  key: DB_USER
            - name: DB_NAME
              valueFrom:
                configMapKeyRef:
                  name: backend-config
                  key: DB_NAME
            - name: DB_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: backend-secrets
                  key: DB_PASSWORD
          volumeMounts:
            - name: sql
              mountPath: /sql
      volumes:
        - name: sql
          configMap:
            name: db-sql   # created from db/init/*.sql files by deploy-eks.yml
